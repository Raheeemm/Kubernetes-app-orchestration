<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ZapLink - Premium URL Shortener{% endblock %}</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Radial animated background blobs -->
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>
    
    <div class="app-container">
        <!-- Navigation Header -->
        <header class="main-header glass-card">
            <div class="header-logo">
                <a href="{{ url_for('index') }}" class="logo-link">
                    <i data-lucide="zap" class="logo-icon"></i>
                    <span class="logo-text">Zap<span class="text-accent">Link</span></span>
                </a>
            </div>
            <nav class="header-nav">
                <a href="{{ url_for('index') }}" class="nav-link">
                    <i data-lucide="home"></i> Home
                </a>
                <a href="https://github.com" target="_blank" class="nav-link">
                    <i data-lucide="github"></i> GitHub
                </a>
            </nav>
        </header>

        <!-- Main Content Area -->
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>

        <!-- Footer -->
        <footer class="main-footer">
            <p>&copy; 2026 ZapLink. Built with Flask, SQLite, &amp; Passion.</p>
        </footer>
    </div>

    <!-- Script file -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
